<html lang="zh-Hant">
<head>
    <meta content="text/html;charset=utf-8" http-equiv="content-type">

	<meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://static.daf-shoes.com/_Art/web/standard/css/component.css">
    <script type="text/javascript" src="https://www.daf-shoes.com/site/js/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="header">
    <div class="header__menu">
        <a class="pt-all" href="product-category.html">全部商品</a>
        <a href="product-category.html">新品</a>

        <a href="https://www.daf-shoes.com/product/pageSet/3329">穿搭</a>
        <a href="product-event.html" style="color: #CF93CC;">SALE</a>
    </div>

    <div class="header__logo">
        <a href="index.html"><img src="https://www.daf-shoes.com/site/images/daf-logo.svg" alt="D+AF"></a>
    </div>

    <div class="header__syslink">
        <button type="button" class="header__syslink__search"><i class="icon-search"></i></button>
        
        <a class="header__syslink__member" href="member.html"><i class="icon-member"></i></a>

        <button class="header__syslink__menu mobile" type="button"><i class="icon-menu"></i></button>
    </div>
</div><!-- END .header -->

<!-- 內容開始 -->
<link rel="stylesheet" href="https://static.daf-shoes.com/_Art/landingpage/swiper-bundle.min.css" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Gilda+Display&family=Jost:ital,wght@0,100..900;1,100..900&display=swap');
body { overflow-x: hidden; background: #000000; }
.main .content { padding: 0; }
.wrapper .wrapper-content { width: 100% !important; }

.daf-container { color: #000000; font-size: 16px; font-weight: normal; letter-spacing: 0.5px;
    font-family: 'Jost', 'Microsoft JhengHei', '黑體', sans-serif, serif; background: #FFFFFF; }
.daf-container * { -webkit-box-sizing: border-box; -moz-box-sizing: border-box; box-sizing: border-box; }
.daf-container section:not(.mainkv) { position: relative; width: 100%; margin: 0 auto; }
.daf-container img { display: block; width: 100%; height: auto; }
.daf-container a { color: #000000; text-decoration: none !important; }
.daf-container a:hover { text-decoration: none !important; }
.daf-container a > .pic { display: block; overflow: hidden; }
.daf-container a > .pic img { transition: 0.3s; }
.daf-container a:hover > .pic img { transform: scale(1.02); }
.daf-container .mobile { display: none; }

.mainkv { position: relative; width: 100%; z-index: 0; }
.mainkv > a { display: block; }
.mainkv .mainkv-list { width: 100%; }
.mainkv .mainkv-list .swiper-slide { display: block; overflow: hidden; }
.mainkv .swiper-button-prev, .swiper-button-next { display: none; }
.mainkv .swiper-pagination { bottom: 15px; }
.mainkv .swiper-pagination-bullet { width: 10px; height: 10px; margin: 0 6px; background: #FFFFFF; }

@media (max-width: 820px) {
    .daf-container { font-size: 15px; -webkit-text-size-adjust: none; }
    .daf-container .pc { display: none; }
    .daf-container .mobile { display: block; }
}
</style>

<div class="daf-container">
    <section class="mainkv">
        <div class="swiper-container mainkv-list">
            <div class="swiper-wrapper">
				<a class="swiper-slide" href="#">
                    <img class="pc" src="images/mainkv1.jpg" alt="">
                    <img class="mobile" src="images/mainkv1-m.jpg" alt="">
                </a>

                <a class="swiper-slide" href="#">
                    <img class="pc" src="images/mainkv2.jpg" alt="">
                    <img class="mobile" src="images/mainkv2-m.jpg" alt="">
                </a>

                <a class="swiper-slide" href="#">
                    <img class="pc" src="images/mainkv3.jpg" alt="">
                    <img class="mobile" src="images/mainkv3-m.jpg" alt="">
                </a>
			</div>
			<div class="swiper-button-next"></div>
			<div class="swiper-button-prev"></div>
			<div class="swiper-pagination"></div>
		</div>
    </section>

    <section class="mainkv">
        <div class="pc"><img src="images/0331.jpg"></div>
        <div class="mobile"><img src="images/0331-m.jpg"></div>
    </section>
</div><!-- END .daf-container -->
<script src="https://static.daf-shoes.com/_Art/landingpage/swiper-bundle.min.js"></script>
<script>
var swiper = new Swiper('.mainkv-list', {
	autoHeight: true,
	spaceBetween: 0,
    allowTouchMove: true, //允許手勢滑動切換 true | false
    loop: true, //允許輪播重複執行 true | false
	autoplay: {
	  delay: 2500,
	  disableOnInteraction: false,
	},
	navigation: {
	  nextEl: ".swiper-button-next",
	  prevEl: ".swiper-button-prev",
	},
    pagination: false,

    //pagination是輪播下方的圓形點點, 要的話把註解拿掉即可
	pagination: {
	  el: ".swiper-pagination",
      clickable: true,
	},
});
</script>
<!-- 內容結束 -->


</body>
</html>
